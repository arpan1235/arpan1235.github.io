function renderGrid(grid) {
  return grid.map(row => {
    let line = row.map(v => {
      if (v === 0) return ' ';
      const c = Math.min(255, v);
      return '<span style="color:rgb('+c+','+c+','+c+')">\u25aa</span>';
    }).join('');
    return line.replace(/ +$/, '');
  }).join('\n');
}

const content = document.getElementById('content');

function wrapWords(text) {
  return text.split(/(\s+)/).map(part => {
    if (/^\s+$/.test(part)) return part;
    return '<span class="word">' + part + '</span>';
  }).join('');
}

function wrapHTMLWords(html) {
  return html.split(/(<[^>]+>)/).map(part => {
    if (part.startsWith('<')) return part;
    return part.split(/(\s+)/).map(w => {
      if (/^\s*$/.test(w)) return w;
      return '<span class="word">' + w + '</span>';
    }).join('');
  }).join('');
}

const STAGGER = 65;

function buildContent() {
  const bodyWrap = document.createElement('div');
  bodyWrap.className = 'fade-section';

  const linksWrap = document.createElement('div');
  linksWrap.className = 'fade-links';

  let section = 'header';

  for (const line of lines) {
    if (section === 'header' && line.type === 'label') {
      section = 'body';
    }
    if (section === 'body' && line.type === 'link') {
      section = 'links';
    }

    if (line.type === 'spacer') {
      const s = document.createElement('div');
      s.className = 'spacer';
      if (section === 'header') content.appendChild(s);
      else if (section === 'body') bodyWrap.appendChild(s);
      else linksWrap.appendChild(s);
      continue;
    }

    const el = document.createElement('div');

    if (line.type === 'name') {
      el.className = 'name';
      el.innerHTML = wrapWords(line.text);
    } else if (line.type === 'role') {
      el.className = 'role';
      el.innerHTML = wrapHTMLWords(line.html);
    } else if (line.type === 'label') {
      el.className = 'section-label';
      el.textContent = line.text;
    } else if (line.type === 'para') {
      el.className = 'section-text';
      el.textContent = line.text;
    } else if (line.type === 'rich') {
      el.className = 'section-text';
      el.innerHTML = line.html;
    } else if (line.type === 'text') {
      el.className = 'section-text';
      el.textContent = line.text;
    } else if (line.type === 'link') {
      el.className = 'link-row';
      el.onclick = () => window.open(line.url, '_blank');
      el.textContent = '\u25b8 ' + line.label.padEnd(10) + ' ' + line.display;
    } else if (line.type === 'hint') {
      el.className = 'hint';
      el.textContent = line.text;
    }

    if (section === 'header') content.appendChild(el);
    else if (section === 'body') bodyWrap.appendChild(el);
    else linksWrap.appendChild(el);
  }

  content.appendChild(bodyWrap);
  content.appendChild(linksWrap);

  const nameEl = content.querySelector('.name');
  const roleEl = content.querySelector('.role');
  const nameWords = nameEl ? nameEl.querySelectorAll('.word') : [];
  const roleWords = roleEl ? roleEl.querySelectorAll('.word') : [];

  let t = 200;
  nameWords.forEach((word) => {
    setTimeout(() => word.classList.add('visible'), t);
    t += STAGGER;
  });

  const titleStart = t + 250;
  let t2 = titleStart;
  roleWords.forEach((word) => {
    setTimeout(() => word.classList.add('visible'), t2);
    t2 += STAGGER;
  });

  setTimeout(() => bodyWrap.classList.add('visible'), t2 + 500);
  setTimeout(() => linksWrap.classList.add('visible'), t2 + 1400);
}

buildContent();
